[pytest]
# Configurazione pytest per BRT Spedizioni App

# Directory dei test
testpaths = tests

# Pattern per i file di test
python_files = test_*.py

# Pattern per le classi di test
python_classes = Test*

# Pattern per le funzioni di test
python_functions = test_*

# Opzioni di default
addopts =
    -v
    --tb=short
    --strict-markers

# Markers personalizzati
markers =
    gui: tests che richiedono l'interfaccia grafica
    slow: tests che richiedono più tempo
    integration: tests di integrazione
